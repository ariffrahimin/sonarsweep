name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Tidy modules
        run: go mod tidy

      - name: Run tests
        run: go test ./...

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: darwin
            arch: arm64
            artifact: sonarsweep-darwin-arm64.tar.gz
          - platform: darwin
            arch: amd64
            artifact: sonarsweep-darwin-amd64.tar.gz
          - platform: linux
            arch: amd64
            artifact: sonarsweep-linux-amd64.tar.gz
          - platform: windows
            arch: amd64
            artifact: sonarsweep-windows-amd64.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Get dependencies
        run: |
          go mod download
          go mod tidy

      - name: Build
        env:
          GOOS: ${{ matrix.platform }}
          GOARCH: ${{ matrix.arch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -ldflags="-s -w" -o sonarsweep${ext} main.go

      - name: Package
        shell: bash
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          if [ "$GOOS" = "windows" ]; then
            zip ${{ matrix.artifact }} sonarsweep${ext}
          else
            tar -czf ${{ matrix.artifact }} sonarsweep${ext}
          fi
        env:
          GOOS: ${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    name: Publish to Homebrew
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: ariffrahimin/homebrew-sonarsweep
          token: ${{ secrets.HOMEBREW_PAT }}
          path: homebrew-tap

      - name: Update formula
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          cd homebrew-tap
          SHA_DARWIN_ARM64=$(shasum -a 256 artifacts/sonarsweep-darwin-arm64.tar.gz | awk '{print $1}')
          SHA_DARWIN_AMD64=$(shasum -a 256 artifacts/sonarsweep-darwin-amd64.tar.gz | awk '{print $1}')
          SHA_LINUX=$(shasum -a 256 artifacts/sonarsweep-linux-amd64.tar.gz | awk '{print $1}')
          SHA_WINDOWS=$(shasum -a 256 artifacts/sonarsweep-windows-amd64.zip | awk '{print $1}')
          
          sed -i '' \
            -e "s|sha256-darwin-arm64 = .*|sha256-darwin-arm64 = $SHA_DARWIN_ARM64|" \
            -e "s|sha256-darwin-amd64 = .*|sha256-darwin-amd64 = $SHA_DARWIN_AMD64|" \
            -e "s|sha256-linux-amd64 = .*|sha256-linux-amd64 = $SHA_LINUX|" \
            -e "s|sha256-windows-amd64 = .*|sha256-windows-amd64 = $SHA_WINDOWS|" \
            -e "s|version = \".*\"|version = \"${VERSION#v}\"|" \
            sonarsweep.rb

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add sonarsweep.rb
          git commit -m "Release $VERSION"
          git push