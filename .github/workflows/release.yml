name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Tidy modules
        run: go mod tidy

      - name: Run tests
        run: go test ./...

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: darwin
            arch: arm64
            artifact: sonarsweep-darwin-arm64.tar.gz
          - platform: darwin
            arch: amd64
            artifact: sonarsweep-darwin-amd64.tar.gz
          - platform: linux
            arch: amd64
            artifact: sonarsweep-linux-amd64.tar.gz
          - platform: windows
            arch: amd64
            artifact: sonarsweep-windows-amd64.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Get dependencies
        run: |
          go mod download
          go mod tidy

      - name: Build
        env:
          GOOS: ${{ matrix.platform }}
          GOARCH: ${{ matrix.arch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -ldflags="-s -w -X main.VERSION=${{ github.ref_name }}" -o sonarsweep${ext} main.go

      - name: Package
        shell: bash
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          if [ "$GOOS" = "windows" ]; then
            zip ${{ matrix.artifact }} sonarsweep${ext}
          else
            tar -czf ${{ matrix.artifact }} sonarsweep${ext}
          fi
        env:
          GOOS: ${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    name: Publish to Homebrew
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: ariffrahimin/homebrew-sonarsweep
          token: ${{ secrets.HOMEBREW_PAT }}
          path: homebrew-tap

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Debug artifacts
        run: |
          echo "=== pwd ==="
          pwd
          echo "=== artifacts directory ==="
          ls -la artifacts/
          echo "=== find all files in nested dirs ==="
          find artifacts/ -type f -ls

      - name: Update formula
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          ARTIFACTS_DIR="${GITHUB_WORKSPACE}/artifacts"

          SONAR_DARWIN_ARM64="${ARTIFACTS_DIR}/sonarsweep-darwin-arm64.tar.gz"
          SONAR_DARWIN_AMD64="${ARTIFACTS_DIR}/sonarsweep-darwin-amd64.tar.gz"
          SONAR_LINUX="${ARTIFACTS_DIR}/sonarsweep-linux-amd64.tar.gz"
          SONAR_WINDOWS="${ARTIFACTS_DIR}/sonarsweep-windows-amd64.zip"

          for f in "$SONAR_DARWIN_ARM64" "$SONAR_DARWIN_AMD64" "$SONAR_LINUX" "$SONAR_WINDOWS"; do
            [ -f "$f" ] || { echo "Missing artifact: $f"; exit 1; }
          done

          SHA_DARWIN_ARM64=$(shasum -a 256 "$SONAR_DARWIN_ARM64" | awk '{print $1}')
          SHA_DARWIN_AMD64=$(shasum -a 256 "$SONAR_DARWIN_AMD64" | awk '{print $1}')
          SHA_LINUX=$(shasum -a 256 "$SONAR_LINUX" | awk '{print $1}')
          SHA_WINDOWS=$(shasum -a 256 "$SONAR_WINDOWS" | awk '{print $1}')

          cd homebrew-tap

          sed -i \
            -e "s|SHA256_DARWIN_ARM64_PLACEHOLDER|$SHA_DARWIN_ARM64|" \
            -e "s|SHA256_DARWIN_AMD64_PLACEHOLDER|$SHA_DARWIN_AMD64|" \
            -e "s|SHA256_LINUX_AMD64_PLACEHOLDER|$SHA_LINUX|" \
            -e "s|VERSION_PLACEHOLDER|${VERSION#v}|g" \
            sonarsweep.rb

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add sonarsweep.rb
          git commit -m "Release $VERSION"
          git push